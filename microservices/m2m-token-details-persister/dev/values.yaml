name: "interop-be-m2m-token-details-persister"
techStack: "nodejs"

service:
  create: false

serviceAccount:
  roleArn: "arn:aws:iam::{{.Values.local.awsAccountId}}:role/interop-be-m2m-token-details-persister-{{.Values.namespace}}-es1"

configmap:
  KAFKA_CLIENT_ID: "{{.Values.namespace}}-pagopa-interop-m2m-token-details-persister"
  KAFKA_GROUP_ID: "{{.Values.namespace}}-m2m-token-details-persister"
  AVERAGE_KAFKA_MESSAGE_SIZE_IN_BYTES: "1110"
  MESSAGES_TO_READ_PER_BATCH: "1000"
  MAX_WAIT_KAFKA_BATCH_MILLIS: "25000"
  S3_BUCKET: "interop-generated-m2m-jwt-details-{{.Values.namespace}}-es1"

deployment:
  image:
    repositoryName: "interop-be-token-details-persister"
  env:
    TOPIC_STARTING_OFFSET: "earliest"
  envFromFieldRef:
    AWS_ROLE_SESSION_NAME: "metadata.name"
  envFromConfigmaps:
    TOKEN_AUDITING_TOPIC: "common-kafka.API_TOKEN_AUDITING_TOPIC"
    KAFKA_BROKERS: "common-kafka.KAFKA_BROKERS"
