name: interop-be-scheduled-notification-scheduler
techStack: nodejs

serviceAccount:
  roleArn: "arn:aws:iam::{{.Values.local.awsAccountId}}:role/interop-be-scheduled-notification-scheduler-{{.Values.namespace}}-es1"

service:
  create: false

configmap:
  KAFKA_GROUP_ID: "{{.Values.namespace}}-scheduled-notification-scheduler"
  TOPIC_STARTING_OFFSET: "latest"
  ESERVICE_MANUAL_ARCHIVE_REMINDER_DAYS: "2,1"
  ESERVICE_DESCRIPTOR_MANUAL_ARCHIVE_REMINDER_DAYS: "2,1"
  REMINDER_SEND_AT_HOUR: "14"
  REMINDER_SEND_AT_TZ: "Europe/Rome"

deployment:
  flywayInitContainer:
    create: true
    migrationsConfigmap: "flyway-scheduled-notification"
    env:
      FLYWAY_CREATE_SCHEMAS: true
      FLYWAY_PLACEHOLDER_REPLACEMENT: true
      FLYWAY_PLACEHOLDERS_NAMESPACE: "{{.Values.namespace}}"
      FLYWAY_URL: jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
      FLYWAY_SCHEMAS: "{{.Values.namespace}}_scheduled_notification"
    envFromConfigmaps:
      POSTGRES_HOST: "common-scheduled-notification-db.DB_HOST"
      POSTGRES_PORT: "common-scheduled-notification-db.DB_PORT"
      POSTGRES_DB: "common-scheduled-notification-db.DB_NAME"
    envFromSecrets:
      FLYWAY_USER: "platform-data-flyway-user.username"
      FLYWAY_PASSWORD: "platform-data-flyway-user.password"

  envFromConfigmaps:
    CATALOG_TOPIC: "common-kafka.CATALOG_TOPIC"
    KAFKA_BROKERS: "common-kafka.KAFKA_BROKERS"
    SCHEDULED_NOTIFICATION_DB_HOST: "common-scheduled-notification-db.DB_HOST"
    SCHEDULED_NOTIFICATION_DB_PORT: "common-scheduled-notification-db.DB_PORT"
    SCHEDULED_NOTIFICATION_DB_NAME: "common-scheduled-notification-db.DB_NAME"
    SCHEDULED_NOTIFICATION_DB_USE_SSL: "common-scheduled-notification-db.DB_USE_SSL"
    SCHEDULED_NOTIFICATION_DB_SCHEMA: "common-scheduled-notification-db.DB_SCHEMA"
  envFromSecrets:
    SCHEDULED_NOTIFICATION_DB_USERNAME: "platform-data-scheduled-notification-scheduler-user.username"
    SCHEDULED_NOTIFICATION_DB_PASSWORD: "platform-data-scheduled-notification-scheduler-user.password"
  envFromFieldRef:
    AWS_ROLE_SESSION_NAME: "metadata.name"
    KAFKA_CLIENT_ID: "metadata.name"
