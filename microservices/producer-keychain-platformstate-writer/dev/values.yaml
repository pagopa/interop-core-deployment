name: interop-be-producer-keychain-platformstate-writer
techStack: nodejs

serviceAccount:
  roleArn: "arn:aws:iam::{{.Values.local.awsAccountId}}:role/interop-be-producer-keychain-platformstate-writer-{{.Values.namespace}}-es1"

service:
  create: false

configmap:
  KAFKA_GROUP_ID: "{{.Values.namespace}}-producer-keychain-platformstate-writer"
  TOPIC_STARTING_OFFSET: "earliest" #TBD
  PRODUCER_KEYCHAIN_PLATFORM_STATES_TABLE_NAME: "interop-async-exchanges-producer-keychain-platform-states-{{.Values.namespace}}"
  TOKEN_GENERATION_READMODEL_TABLE_NAME_PLATFORM: "interop-platform-states-{{.Values.namespace}}"
  TOKEN_GENERATION_READMODEL_TABLE_NAME_TOKEN_GENERATION: "interop-token-generation-states-{{.Values.namespace}}"

deployment:
  envFromConfigmaps:
    KAFKA_BROKERS: "common-kafka.KAFKA_BROKERS"
    AUTHORIZATION_TOPIC: "common-kafka.AUTHORIZATION_TOPIC"
  envFromFieldRef:
    AWS_ROLE_SESSION_NAME: "metadata.name"
    KAFKA_CLIENT_ID: "metadata.name"