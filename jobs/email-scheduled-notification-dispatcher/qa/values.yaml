name: interop-be-email-scheduled-notification-dispatcher

serviceAccount:
  roleArn: "arn:aws:iam::{{.Values.local.awsAccountId}}:role/interop-be-email-scheduled-notification-dispatcher-{{.Values.namespace}}-es1"

configmap:
  KAFKA_GROUP_ID: "{{.Values.namespace}}-email-scheduled-notification-dispatcher"
  TOPIC_STARTING_OFFSET: "latest"

cronjob:
  schedule: "30 0 * * 1-5"
  failedJobsHistoryLimit: 1
  successfulJobsHistoryLimit: 1
  restartPolicy: Never
  concurrencyPolicy: Forbid
  parallelism: 1
  activeDeadlineSeconds: 600
  backoffLimit: 0
  suspend: true

  flywayInitContainer:
    create: true
    migrationsConfigmap: "flyway-scheduled-notification"
    env:
      FLYWAY_CREATE_SCHEMAS: true
      FLYWAY_PLACEHOLDER_REPLACEMENT: true
      FLYWAY_PLACEHOLDERS_NAMESPACE: "{{.Values.namespace}}"
      FLYWAY_URL: jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)
      FLYWAY_SCHEMAS: "{{.Values.namespace}}_scheduled_notification"
    envFromConfigmaps:
      POSTGRES_HOST: "common-scheduled-notification-db.DB_HOST"
      POSTGRES_PORT: "common-scheduled-notification-db.DB_PORT"
      POSTGRES_DB: "common-scheduled-notification-db.DB_NAME"
    envFromSecrets:
      FLYWAY_USER: "platform-data-flyway-user.username"
      FLYWAY_PASSWORD: "platform-data-flyway-user.password"

  env:
    BFF_URL: "https://selfcare.qa.interop.pagopa.it/0.0/backend-for-frontend"
    NOTIFICATION_TYPE_BLOCKLIST: ""
    DELIVERY_BATCH_SIZE: "100"
    MAX_ATTEMPTS: "5"
    MAX_BATCHES_PER_RUN: "10"
    SCHEDULED_NOTIFICATION_STALENESS_THRESHOLD_HOURS: "24"

  envFromConfigmaps:
    EMAIL_DISPATCH_TOPIC: "common-kafka.EMAIL_DISPATCH_TOPIC"
    PRODUCER_KAFKA_BROKERS: "common-kafka.KAFKA_BROKERS"
    READMODEL_SQL_DB_HOST: "common-read-model-sql.DB_HOST_RO"
    READMODEL_SQL_DB_PORT: "common-read-model-sql.DB_PORT"
    READMODEL_SQL_DB_NAME: "common-read-model-sql.DB_NAME"
    READMODEL_SQL_DB_USE_SSL: "common-read-model-sql.DB_USE_SSL"
    READMODEL_SQL_DB_SCHEMA_AGREEMENT: "common-read-model-sql.DB_SCHEMA_AGREEMENT"
    READMODEL_SQL_DB_SCHEMA_ATTRIBUTE: "common-read-model-sql.DB_SCHEMA_ATTRIBUTE"
    READMODEL_SQL_DB_SCHEMA_CATALOG: "common-read-model-sql.DB_SCHEMA_CATALOG"
    READMODEL_SQL_DB_SCHEMA_DELEGATION: "common-read-model-sql.DB_SCHEMA_DELEGATION"
    READMODEL_SQL_DB_SCHEMA_ESERVICE_TEMPLATE: "common-read-model-sql.DB_SCHEMA_ESERVICE_TEMPLATE"
    READMODEL_SQL_DB_SCHEMA_NOTIFICATION_CONFIG: "common-read-model-sql.DB_SCHEMA_NOTIFICATION_CONFIG"
    READMODEL_SQL_DB_SCHEMA_PURPOSE: "common-read-model-sql.DB_SCHEMA_PURPOSE"
    READMODEL_SQL_DB_SCHEMA_TENANT: "common-read-model-sql.DB_SCHEMA_TENANT"
    SCHEDULED_NOTIFICATION_DB_HOST: "common-scheduled-notification-db.DB_HOST"
    SCHEDULED_NOTIFICATION_DB_PORT: "common-scheduled-notification-db.DB_PORT"
    SCHEDULED_NOTIFICATION_DB_NAME: "common-scheduled-notification-db.DB_NAME"
    SCHEDULED_NOTIFICATION_DB_USE_SSL: "common-scheduled-notification-db.DB_USE_SSL"
    SCHEDULED_NOTIFICATION_DB_SCHEMA: "common-scheduled-notification-db.DB_SCHEMA"
  envFromSecrets:
    SCHEDULED_NOTIFICATION_DB_USERNAME: "platform-data-email-scheduled-notification-dispatcher-user.username"
    SCHEDULED_NOTIFICATION_DB_PASSWORD: "platform-data-email-scheduled-notification-dispatcher-user.password"
    READMODEL_SQL_DB_USERNAME: "platform-data-email-scheduled-notification-dispatcher-user.username"
    READMODEL_SQL_DB_PASSWORD: "platform-data-email-scheduled-notification-dispatcher-user.password"
  envFromFieldRef:
    AWS_ROLE_SESSION_NAME: "metadata.name"
    KAFKA_CLIENT_ID: "metadata.name"
    PRODUCER_KAFKA_CLIENT_ID: "metadata.name"
