name: Generic PR Validation

on: 
  workflow_call:
    inputs:
      environment:
        description: 'Environment to run diff against'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  actionlint:
    name: GitHub Actions Workflow Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29

      - name: actionlint
        id: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: false  
          flags: "-color SC2086"

      - name: actionlint Summary
        if: ${{ steps.actionlint.outputs.exit-code != 0 }}
        run: |
          echo "Used actionlint version ${{ steps.actionlint.outputs.version-semver }}"
          echo "Used actionlint release ${{ steps.actionlint.outputs.version-tag }}"
          echo "actionlint ended with ${{ steps.actionlint.outputs.exit-code }} exit code"
          echo "actionlint ended because '${{ steps.actionlint.outputs.exit-message }}'"
          echo "actionlint found ${{ steps.actionlint.outputs.total-errors }} errors"
          echo "actionlint checked ${{ steps.actionlint.outputs.total-files }} files"
          echo "actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"

  repo_structure_validation:
    name: Repo Structure Validation
    runs-on: ubuntu-22.04
    # if: ${{ vars.ENABLE_REPO_STRUCTURE_VALIDATION == 'true' }}
    needs: [ actionlint ]
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29

      - name: Run repository structure checks
        env:
          REPO_STRUCTURE_VALIDATION_WARNING_ONLY: ${{ vars.REPO_STRUCTURE_VALIDATION_WARNING_ONLY }}
          ENABLE_ARGO_TEMPLATE_VALIDATION: ${{ vars.ENABLE_ARGO_TEMPLATE_VALIDATION }}
        run: |
          set -euo pipefail

          WARNING_ONLY_ARG=""
          if [[ "${REPO_STRUCTURE_VALIDATION_WARNING_ONLY:-false}" == "true" ]]; then
            WARNING_ONLY_ARG="--warning-only"
          fi

          echo "Argo template checks flag status: ENABLE_ARGO_TEMPLATE_VALIDATION=${ENABLE_ARGO_TEMPLATE_VALIDATION:-false}"
          bash scripts/validation/validate-repo-structure.sh \
            --repo-root "${GITHUB_WORKSPACE}" \
            --target-env "${{ inputs.environment }}" \
            --legacy-exceptions-file docs/repo-structure-validation-exceptions.txt \
            ${WARNING_ONLY_ARG}

  lint:
    needs: [ actionlint, repo_structure_validation ]
    if: ${{ always() && needs.actionlint.result == 'success' && (vars.ENABLE_REPO_STRUCTURE_VALIDATION != 'true' || needs.repo_structure_validation.result == 'success') }}
    secrets: inherit
    uses: ./.github/workflows/pr-validation-sub-core-validation.yaml
    with:
      environment: ${{ inputs.environment }}

  common_values_validation:
    needs: [ actionlint ]
    # condition disabled temporarily if: ${{ vars.ENABLE_COMMON_VALUES_VALIDATION == 'true' }}
    secrets: inherit
    uses: pagopa/interop-infra-commons/.github/workflows/common-deployment-values-validation.yaml@main
    with:
      environment: ${{ inputs.environment }}
      infra_commons_tag: "main"
      strict_kube_linter_checks: true
  
  create_runner:
    name: "[${{ inputs.environment }}] Create Self-Hosted"
    runs-on: ubuntu-22.04
    # condition disabled temporarily if: ${{ vars.ENABLE_KUBE_DIFF == 'true' }}
    needs: [ lint ]
    environment: ${{ inputs.environment }}
    outputs:
      ecs_task_id: ${{ steps.start_runner.outputs.ecs_task_id }}
    strategy:
      matrix:
        index: [1,2,3]
      fail-fast: false
    steps:
      - name: "[${{ inputs.environment }}] Start GitHub Runner"
        id: start_runner
        uses: pagopa/interop-github-runner-aws-create-action@main
        with:
          aws_region: ${{ secrets.AWS_REGION }}
          iam_role_arn: ${{ secrets.ECS_IAM_ROLE_ARN }}
          ecs_cluster_name: ${{ secrets.ECS_CLUSTER_NAME }}
          ecs_task_definition: ${{ secrets.ECS_TASK_DEFINITION }}
          ecs_task_cpu: ${{ vars.ECS_TASK_CPU }}
          ecs_task_memory: ${{ vars.ECS_TASK_MEMORY }}
          ecs_container_name: ${{ vars.ECS_TASK_CONTAINER_NAME }}
          ecs_task_subnet_id: ${{ secrets.SUBNET_ID }}
          ecs_task_sec_group: ${{ secrets.SEC_GROUP_ID }}
          ecs_task_max_duration_seconds: ${{ vars.ECS_TASK_MAX_DURATION_SECONDS }}
          pat_token: ${{ secrets.BOT_TOKEN }}
          environment: ${{ inputs.environment }}
  
  diff:
    needs: [ create_runner ]
    secrets: inherit
    uses: ./.github/workflows/pr-validation-sub-core-diff.yaml
    with:
      environment: ${{ inputs.environment }}

  delete_runner:
    name: "[${{ inputs.environment }}] Delete Self-Hosted Runner"
    needs: [ diff ]
    # condition disabled temporarily if: ${{ vars.ENABLE_KUBE_DIFF == 'true' }}
    runs-on: ubuntu-22.04
    environment: ${{ inputs.environment }}
    strategy:
      matrix:
        index: [1,2,3]
      fail-fast: false
    steps:
      - name: Stop Github Runner
        id: stop_runner
        uses: pagopa/interop-github-runner-aws-cleanup-action@main
        with:
          aws_region: ${{ secrets.AWS_REGION }}
          iam_role_arn: ${{ secrets.ECS_IAM_ROLE_ARN }}
          ecs_cluster_name: ${{ secrets.ECS_CLUSTER_NAME }}
          pat_token: ${{ secrets.BOT_TOKEN }}
          environment: ${{ inputs.environment }}
    
